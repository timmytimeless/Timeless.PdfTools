name: Publish NuGet

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Timeless.PdfTools.sln

      - name: Test
        run: dotnet test Timeless.PdfTools.sln --configuration Release --no-restore

      - name: Pack
        run: dotnet pack Timeless.PdfTools.Lib/Timeless.PdfTools.Lib.csproj --configuration Release --no-restore --output ./artifacts

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: timmytimeless

      - name: Publish
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
